<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: url("fonts/grotesk.woff2") format("woff2");
        font-weight: 300 700; font-display: swap;
      }
      @font-face {
        font-family: "Inter";
        src: url("fonts/inter.woff2") format("woff2");
        font-weight: 100 900; font-display: swap;
      }
      :root {
        --bg: #0b0b10; --card: rgba(255, 255, 255, 0.045); --line: rgba(255, 255, 255, 0.1);
        --line-strong: rgba(255, 255, 255, 0.16); --ink: #f2f3f7; --grey: #9b9fad; --faint: #6b6f7c;
        --a1: #7c5cff; --a2: #00d4ff; --grad: linear-gradient(135deg, #7c5cff, #00d4ff);
        --sans: "Inter", system-ui, -apple-system, sans-serif;
        --disp: "Space Grotesk", "Inter", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        width: 330px; margin: 0; padding: 18px 18px 14px;
        background: var(--bg); color: var(--ink);
        font: 13px/1.55 var(--sans); -webkit-font-smoothing: antialiased;
        animation: pop-in 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
        background-image: radial-gradient(280px 160px at 15% -10%, rgba(124, 92, 255, 0.16), transparent 70%);
      }
      @keyframes pop-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      .head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .mark { font-family: var(--disp); font-weight: 700; font-size: 22px; letter-spacing: -0.03em; line-height: 1; }
      .mark .dot { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

      .status {
        font-size: 11px; font-weight: 600; color: var(--grey);
        border: 1px solid var(--line-strong); background: var(--card);
        border-radius: 999px; padding: 4px 11px; white-space: nowrap;
        display: inline-flex; align-items: center; gap: 6px; transition: all 0.22s ease;
      }
      .status i { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }
      .status.oncall { color: #3ddc84; border-color: rgba(61, 220, 132, 0.4); background: rgba(61, 220, 132, 0.08); }
      .status.oncall i { background: #3ddc84; box-shadow: 0 0 7px rgba(61, 220, 132, 0.8); }
      .status.live { color: #8f7bff; border-color: rgba(124, 92, 255, 0.5); background: rgba(124, 92, 255, 0.1); }
      .status.live i { background: #8f7bff; box-shadow: 0 0 7px rgba(124, 92, 255, 0.9); }

      .sub { color: var(--grey); margin: 8px 0 16px; font-size: 12.5px; }

      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 14px;
        padding: 13px; margin-bottom: 12px;
      }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .row + .row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
      .lab { font-weight: 600; font-size: 12px; }
      .lab .hint { display: block; font-weight: 400; color: var(--faint); font-size: 11px; margin-top: 1px; }

      .seg { display: flex; gap: 2px; background: rgba(255, 255, 255, 0.06); border-radius: 999px; padding: 3px; }
      .seg button {
        border: none; background: transparent; cursor: pointer; color: var(--grey);
        font: 600 11px var(--sans); padding: 5px 9px; border-radius: 999px;
        transition: color 0.15s, background 0.15s;
      }
      .seg button:hover { color: var(--ink); }
      .seg button.on { background: var(--grad); color: #fff; box-shadow: 0 2px 8px rgba(124, 92, 255, 0.5); }

      .switch { position: relative; width: 38px; height: 22px; cursor: pointer; flex-shrink: 0; }
      .switch input { position: absolute; opacity: 0; pointer-events: none; }
      .switch .track {
        position: absolute; inset: 0; border-radius: 999px;
        background: rgba(255, 255, 255, 0.12); transition: background 0.2s;
      }
      .switch .thumb {
        position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%;
        background: #fff; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .switch input:checked ~ .track { background: var(--grad); }
      .switch input:checked ~ .track .thumb { transform: translateX(16px); }

      .cta {
        width: 100%; border: none; border-radius: 12px; padding: 12px;
        background: var(--grad); color: #fff; font: 600 13.5px var(--sans);
        cursor: pointer; box-shadow: 0 6px 20px rgba(124, 92, 255, 0.4);
        transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s;
      }
      .cta:hover { transform: translateY(-1px); box-shadow: 0 9px 26px rgba(124, 92, 255, 0.55); }
      .cta:active { transform: scale(0.98); }
      .cta.off { background: rgba(255, 255, 255, 0.09); box-shadow: none; color: var(--ink); }
      .ctahint { color: var(--faint); font-size: 11px; text-align: center; margin: 8px 0 0; min-height: 14px; }

      .foot {
        color: var(--faint); font-size: 11px; line-height: 1.55; margin: 14px 0 0;
        padding-top: 11px; border-top: 1px solid var(--line);
        display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      }
      .foot b { color: var(--grey); font-weight: 600; }
      .foot a { color: var(--grey); font-weight: 600; text-decoration: none; white-space: nowrap; }
      .foot a:hover { color: var(--ink); }
      .foot a .dot { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="mark">hindsight<span class="dot">.</span></div>
      <span class="status" id="status"><i></i><span id="status-text">ready</span></span>
    </div>
    <p class="sub">Your honest mirror, one glance away.</p>

    <div class="card">
      <div class="row">
        <span class="lab">Delay<span class="hint">how far back the mirror looks</span></span>
        <div class="seg" id="seg">
          <button data-delay="0">Live</button>
          <button data-delay="1000">1s</button>
          <button data-delay="2000">2s</button>
          <button data-delay="3000">3s</button>
          <button data-delay="5000">5s</button>
        </div>
      </div>
      <div class="row">
        <span class="lab">Mirror image<span class="hint">off = how others actually see you</span></span>
        <label class="switch">
          <input type="checkbox" id="mirror" />
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
    </div>

    <button class="cta" id="cta">Open floating mirror</button>
    <p class="ctahint" id="ctahint"></p>

    <p class="foot">
      <span><b>Provably local.</b> No recording, no upload, no network permission. Frames live for five seconds, then they're gone.</span>
      <a href="https://made-by-ac.com" target="_blank" rel="noopener">made<span class="dot">.</span></a>
    </p>

    <script src="popup.js"></script>
  </body>
</html>
