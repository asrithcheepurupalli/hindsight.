<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"><style>
  body { width: 440px; height: 280px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; text-align: center; }
  .glow-a { width: 420px; height: 300px; left: -110px; top: -120px; }
  .glow-b { width: 460px; height: 320px; right: -130px; bottom: -140px; }
  .wordmark { font-size: 46px; position: relative; }
  .tag { font-size: 16.5px; color: #9b9fad; position: relative; }
  .chip { position: relative; display: inline-flex; align-items: center; gap: 8px;
    background: rgba(10, 10, 16, 0.6); border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 999px; padding: 7px 15px 7px 12px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .chip i { width: 7px; height: 7px; border-radius: 50%; background: #8f7bff; box-shadow: 0 0 8px rgba(143,123,255,0.9); }
</style></head>
<body>
  <div class="glow-a"></div><div class="glow-b"></div>
  <div class="wordmark">rearview<span class="dot">.</span></div>
  <div class="tag">See yourself the way they just saw you.</div>
  <div class="chip"><i></i>you, 3.0s ago</div>
</body></html>
