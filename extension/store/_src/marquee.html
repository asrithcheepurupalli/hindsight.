<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"><style>
  body { width: 1400px; height: 560px; display: flex; align-items: center; gap: 70px; padding: 0 90px; }
  .glow-a { width: 900px; height: 600px; }
  .glow-b { width: 1000px; height: 700px; }
  .copy { flex: 1; position: relative; }
  .copy .wordmark { font-size: 40px; margin-bottom: 22px; }
  .copy h1 { font-size: 56px; margin-bottom: 18px; }
  .copy p { font-size: 20px; line-height: 1.5; color: #9b9fad; max-width: 480px; }
  .stage { position: relative; width: 560px; flex-shrink: 0; }
  .mirror { width: 560px; height: 340px; }
  .made { bottom: 26px; right: 40px; font-size: 16px; }
</style></head>
<body>
  <div class="glow-a"></div><div class="glow-b"></div>
  <div class="copy">
    <div class="wordmark">hindsight<span class="dot">.</span></div>
    <h1>Hindsight is 20/20. Now your <em>self-view</em> is too.</h1>
    <p>A live mirror on a short delay. See yourself exactly the way the other person just saw you.</p>
  </div>
  <div class="stage">
    <div class="mirror">
      <div class="feed">
        <div class="person"><div class="head"></div><div class="body"></div></div>
      </div>
      <div class="badge"><i></i>you, 3.0s ago</div>
      <div class="ctrl">
        <div class="seg"><span>Live</span><span>1s</span><span>2s</span><span class="on">3s</span><span>5s</span></div>
        <span class="pillbtn">Mirror</span>
      </div>
    </div>
  </div>
  <div class="made">a <b>made.</b> product</div>
</body></html>
