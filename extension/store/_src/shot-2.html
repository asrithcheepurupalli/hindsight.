<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"><style>
  body { padding: 64px 80px; }
  .top { text-align: center; margin-bottom: 40px; position: relative; }
  .top h1 { font-size: 46px; margin-bottom: 12px; }
  .top p { font-size: 19px; color: #9b9fad; }
  /* fake call window */
  .call {
    position: relative; width: 1000px; height: 520px; margin: 0 auto;
    border-radius: 16px; overflow: hidden; background: #17171d;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 452px; }
  .tile { border-radius: 12px; background: linear-gradient(170deg, #202029, #15151b); display: flex;
    align-items: center; justify-content: center; position: relative; }
  .tile .init { width: 92px; height: 92px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font: 600 34px "Space Grotesk", sans-serif; color: #fff; }
  .tile:nth-child(1) .init { background: #3d4a8a; }
  .tile:nth-child(2) .init { background: #6a3d8a; }
  .tile .name { position: absolute; left: 12px; bottom: 10px; font-size: 13px; color: rgba(255,255,255,0.75); }
  .callbar { height: 58px; display: flex; align-items: center; justify-content: center; gap: 14px; }
  .cbtn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); }
  .cbtn.red { background: #ea4335; width: 56px; border-radius: 999px; }
  /* the hindsight overlay riding on top */
  .hs { position: absolute; right: 18px; bottom: 76px; width: 252px; border-radius: 14px; overflow: hidden;
    background: rgba(11, 11, 16, 0.88); border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55), 0 0 60px -18px rgba(124, 92, 255, 0.55); }
  .hs-head { display: flex; align-items: center; gap: 7px; padding: 8px 11px;
    color: rgba(242, 243, 247, 0.92); font: 700 12.5px "Inter", sans-serif; letter-spacing: -0.02em; }
  .hs-dot { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, #7c5cff, #00d4ff);
    box-shadow: 0 0 8px rgba(124, 92, 255, 0.9); }
  .hs-x { margin-left: auto; color: #9b9fad; font-size: 13px; }
  .hs .feed { height: 142px; position: relative; overflow: hidden;
    background: radial-gradient(140% 120% at 50% 125%, rgba(124, 92, 255, 0.5), transparent 55%),
      linear-gradient(180deg, #14141f, #0d0d14); }
  .hs .badge { top: 10px; left: 10px; font-size: 11px; padding: 5px 10px 5px 8px; }
  .hs .badge i { width: 6px; height: 6px; }
  .hs-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; }
  .hs-bar .seg span { font-size: 10.5px; padding: 4px 8px; }
  .hs-bar .pillbtn { font-size: 10.5px; padding: 4px 9px; margin-left: auto; }
</style></head>
<body>
  <div class="glow-a"></div><div class="glow-b"></div>
  <div class="top">
    <h1>Lives <em>inside</em> your call.</h1>
    <p>One click mounts a small draggable mirror right in the corner of Meet, Zoom or Teams.</p>
  </div>
  <div class="call">
    <div class="grid">
      <div class="tile"><div class="init">SR</div><span class="name">Sam R.</span></div>
      <div class="tile"><div class="init">JK</div><span class="name">Jae K.</span></div>
    </div>
    <div class="callbar"><div class="cbtn"></div><div class="cbtn"></div><div class="cbtn red"></div><div class="cbtn"></div><div class="cbtn"></div></div>
    <div class="hs">
      <div class="hs-head"><span class="hs-dot"></span><span>hindsight<span class="dot">.</span></span><span class="hs-x">✕</span></div>
      <div class="feed">
        <div class="person" style="width:58%"><div class="head"></div><div class="body"></div></div>
        <div class="badge"><i></i>you, 3.0s ago</div>
      </div>
      <div class="hs-bar">
        <div class="seg"><span>Live</span><span>2s</span><span class="on">3s</span><span>5s</span></div>
        <span class="pillbtn">Mirror</span>
      </div>
    </div>
  </div>
  <div class="made">a <b>made.</b> product</div>
</body></html>
