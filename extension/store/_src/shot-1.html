<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"><style>
  body { display: flex; align-items: center; gap: 60px; padding: 0 80px; }
  .copy { flex: 1; position: relative; }
  .copy .wordmark { font-size: 30px; margin-bottom: 30px; }
  .copy h1 { font-size: 58px; margin-bottom: 24px; }
  .copy p { font-size: 21px; line-height: 1.55; color: #9b9fad; max-width: 460px; }
  .copy p b { color: #f2f3f7; font-weight: 600; }
  .stage { position: relative; width: 520px; }
  .mirror { width: 520px; height: 340px; }
</style></head>
<body>
  <div class="glow-a"></div><div class="glow-b"></div>
  <div class="copy">
    <div class="wordmark">hindsight<span class="dot">.</span></div>
    <h1>See yourself the way they <em>just</em> saw you.</h1>
    <p>A live mirror on a short delay. Glance over and see your <b>real mid-conversation face</b>, eyes on the screen, exactly how the other person saw you.</p>
  </div>
  <div class="stage">
    <div class="mirror">
      <div class="feed">
        <div class="person"><div class="head"></div><div class="body"></div></div>
      </div>
      <div class="badge"><i></i>you, 3.0s ago</div>
      <div class="ctrl">
        <div class="seg"><span>Live</span><span>1s</span><span>2s</span><span class="on">3s</span><span>5s</span></div>
        <span class="pillbtn">Mirror</span>
      </div>
    </div>
  </div>
  <div class="made">a <b>made.</b> product</div>
</body></html>
