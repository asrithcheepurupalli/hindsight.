<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>rearview.</title>
    <style>
      @font-face {
        font-family: "Inter";
        src: url("fonts/inter.woff2") format("woff2");
        font-weight: 100 900; font-display: swap;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body { font-family: "Inter", system-ui, sans-serif; }
      canvas { width: 100%; height: 100%; display: block; object-fit: contain; }

      .start {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
        background: #0b0b10; color: #9b9fad; font-size: 12px; text-align: center;
        padding: 0 24px;
      }
      .start button {
        border: none; border-radius: 999px; padding: 10px 24px; cursor: pointer;
        background: linear-gradient(135deg, #7c5cff, #00d4ff); color: #fff;
        font: 600 13px "Inter", system-ui, sans-serif;
        box-shadow: 0 6px 20px rgba(124, 92, 255, 0.4);
      }
      .start.hidden { display: none; }

      .bar {
        position: absolute; left: 50%; bottom: 10px; transform: translateX(-50%);
        display: flex; align-items: center; gap: 8px; padding: 6px 9px;
        border-radius: 999px; background: rgba(12, 12, 18, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.14); backdrop-filter: blur(12px);
        opacity: 0; transition: opacity 0.18s ease;
        max-width: calc(100% - 20px); flex-wrap: wrap; justify-content: center;
      }
      body:hover .bar { opacity: 1; }
      .bar.hidden { display: none; }

      .seg { display: flex; gap: 2px; background: rgba(255, 255, 255, 0.07); border-radius: 999px; padding: 2px; }
      .seg button {
        border: none; background: transparent; cursor: pointer; color: #9b9fad;
        font: 600 10.5px "Inter", system-ui, sans-serif; padding: 4px 9px; border-radius: 999px;
        transition: color 0.15s, background 0.15s;
      }
      .seg button:hover { color: #fff; }
      .seg button.on { background: linear-gradient(135deg, #7c5cff, #00d4ff); color: #fff; }

      .pillbtn {
        border: 1px solid rgba(255, 255, 255, 0.14); background: rgba(255, 255, 255, 0.06);
        cursor: pointer; color: #9b9fad; font: 600 10.5px "Inter", system-ui, sans-serif;
        padding: 4px 10px; border-radius: 999px; transition: all 0.15s;
      }
      .pillbtn:hover { color: #fff; }
      .pillbtn.on { background: linear-gradient(135deg, #7c5cff, #00d4ff); color: #fff; border-color: transparent; }
    </style>
  </head>
  <body>
    <canvas id="view"></canvas>

    <div class="start" id="start">
      <p id="start-msg">rearview needs your camera to be your mirror.<br />Nothing is recorded or uploaded.</p>
      <button id="start-btn">Start camera</button>
    </div>

    <div class="bar hidden" id="bar">
      <div class="seg" id="seg">
        <button data-delay="0">Live</button>
        <button data-delay="1000">1s</button>
        <button data-delay="2000">2s</button>
        <button data-delay="3000">3s</button>
        <button data-delay="5000">5s</button>
      </div>
      <button class="pillbtn" id="mirror">Mirror</button>
      <button class="pillbtn" id="pip" title="Pop into an always-on-top Picture-in-Picture window">PiP</button>
    </div>

    <script src="mirror-core.js"></script>
    <script src="window.js"></script>
  </body>
</html>
